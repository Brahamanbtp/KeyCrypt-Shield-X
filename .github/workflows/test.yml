# .github/workflows/test.yml
name: Build Check

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Check syntax
      run: |
        python -m pip install --upgrade pip
        python -m py_compile $(find . -name "*.py") 2>/dev/null || echo "No Python files or syntax OK"
    - name: Success
      run: echo "✅ Build check passed"