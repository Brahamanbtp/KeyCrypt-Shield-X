 # Fluentd configuration for KeyCrypt centralized logging
 # Collects container stdout/stderr, audit logs, ingress access logs, and k8s events

 <source>
   @type tail
   @id in_tail_containers
   path /var/log/containers/*.log
   pos_file /var/log/fluentd-containers.pos
   tag kubernetes.container.logs
   read_from_head true
   <parse>
     @type json
     time_key time
     time_format %Y-%m-%dT%H:%M:%S.%NZ
     # If logs are not pure JSON, fallback to single_value_field
     keep_time_key true
   </parse>
 </source>

 <source>
   @type tail
   @id in_tail_audit
   path /var/log/audit/*.log
   pos_file /var/log/fluentd-audit.pos
   tag audit.log
   read_from_head true
   <parse>
     @type json
     time_key timestamp
     time_format %Y-%m-%dT%H:%M:%S.%NZ
     keep_time_key true
   </parse>
 </source>

 <source>
   @type tail
   @id in_tail_ingress
   path /var/log/containers/*ingress*.log
   pos_file /var/log/fluentd-ingress.pos
   tag ingress.access
   read_from_head true
   <parse>
     @type apache2
   </parse>
 </source>

 <source>
   @type monitor_agent
   bind 0.0.0.0
   port 24220
 </source>

 # Enrich with Kubernetes metadata (namespace, pod, labels, annotations)
 <filter kubernetes.**>
   @type kubernetes_metadata_filter
   kubernetes_url 'https://kubernetes.default.svc'
   verify_ssl false
   cache_size 1000
   cache_ttl 600
   annotations true
   labels true
 </filter>

 # Exclude health checks and readiness probes to reduce log volume
 <filter **>
   @type grep
   <exclude>
     key $.message
     pattern /healthz|\/ready|healthcheck|_liveness_probe|readiness_probe/i
   </exclude>
 </filter>

 # Extract trace_id (UUID) or trace header from message fields and add environment/region metadata
 <filter **>
   @type record_transformer
   enable_ruby true
   <record>
     trace_id ${record["trace_id"] || record["traceid"] || (record["message"] =~ /(?<tid>[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})/ && $~[:tid]) || (record["message"] =~ /trace=(?<tid>[0-9a-fA-F\-]+)/ && $~[:tid]) }
     environment ${ENV['FLUENTD_ENV'] || 'production'}
     region ${ENV['FLUENTD_REGION'] || 'us-east-1'}
   </record>
 </filter>

 # Standardize timestamp for downstream systems
 <filter **>
   @type record_transformer
   enable_ruby true
   <record>
     @timestamp ${Time.parse(record["time"] || record["timestamp"] || Time.now.to_s).utc.iso8601}
   </record>
 </filter>

 # Route to multiple outputs: Elasticsearch (indexing/search), S3 (long-term retention), CloudWatch (real-time)
 <match **>
   @type copy

   <store>
     @type elasticsearch
     @id out_es
     host ${ENV['ELASTICSEARCH_HOST'] || 'elasticsearch'}
     port ${ENV['ELASTICSEARCH_PORT'] || 9200}
     scheme http
     logstash_format true
     index_name fluentd
     type_name _doc
     include_tag_key true
     reload_connections false
     request_timeout 10s
     time_slice_format %Y.%m.%d
     buffer_chunk_limit 8m
     buffer_queue_limit 64
     flush_interval 5s
     retry_limit 17
   </store>

   <store>
     @type s3
     @id out_s3
     aws_key_id ${ENV['AWS_ACCESS_KEY_ID']}
     aws_sec_key ${ENV['AWS_SECRET_ACCESS_KEY']}
     aws_region ${ENV['FLUENTD_REGION'] || 'us-east-1'}
     s3_bucket ${ENV['FLUENTD_S3_BUCKET'] || 'keycrypt-logs'}
     path logs/
     time_slice_format %Y/%m/%d/%H
     time_slice_wait 10m
     utc true
     store_as json
     buffer_path /var/log/fluent/s3
     buffer_type file
     buffer_chunk_limit 256m
     buffer_queue_limit 128
     flush_interval 10s
   </store>

   <store>
     @type cloudwatch_logs
     @id out_cw
     log_group_name ${ENV['FLUENTD_CW_GROUP'] || 'keycrypt-app-logs'}
     log_stream_name ${hostname}/${tag}
     auto_create_stream true
     aws_key_id ${ENV['AWS_ACCESS_KEY_ID']}
     aws_sec_key ${ENV['AWS_SECRET_ACCESS_KEY']}
     region ${ENV['FLUENTD_REGION'] || 'us-east-1'}
     buffer_path /var/log/fluent/cloudwatch
     buffer_chunk_limit 8m
     buffer_queue_limit 128
     flush_interval 5s
   </store>

 </match>

 # Separate route for audit logs: index into dedicated ES index and S3 prefix, keep for compliance
 <match audit.log>
   @type copy
   <store>
     @type elasticsearch
     host ${ENV['ELASTICSEARCH_HOST'] || 'elasticsearch'}
     port ${ENV['ELASTICSEARCH_PORT'] || 9200}
     logstash_format true
     index_name audit-%Y.%m.%d
     include_tag_key true
     buffer_chunk_limit 8m
     buffer_queue_limit 64
   </store>
   <store>
     @type s3
     aws_key_id ${ENV['AWS_ACCESS_KEY_ID']}
     aws_sec_key ${ENV['AWS_SECRET_ACCESS_KEY']}
     aws_region ${ENV['FLUENTD_REGION'] || 'us-east-1'}
     s3_bucket ${ENV['FLUENTD_S3_BUCKET'] || 'keycrypt-logs'}
     path audit/
     time_slice_format %Y/%m/%d
     buffer_path /var/log/fluent/s3_audit
     buffer_chunk_limit 256m
     buffer_queue_limit 64
   </store>
 </match>

 # Kubernetes events (if using fluentd-kubernetes-event plugin)
 <source>
   @type tail
   path /var/log/kube-apiserver-events.log
   pos_file /var/log/fluentd-k8s-events.pos
   tag kubernetes.events
   <parse>
     @type json
   </parse>
 </source>

 <match kubernetes.events>
   @type elasticsearch
   host ${ENV['ELASTICSEARCH_HOST'] || 'elasticsearch'}
   port ${ENV['ELASTICSEARCH_PORT'] || 9200}
   logstash_format true
   index_name k8s-events
   buffer_chunk_limit 8m
   buffer_queue_limit 64
 </match>

 # End of Fluentd config
