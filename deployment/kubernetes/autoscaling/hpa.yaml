apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: keycrypt-hpa
  namespace: keycrypt
  labels:
    app: keycrypt
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: keycrypt-deployment
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    - type: External
      external:
        metric:
          name: encryption_queue_depth
        target:
          type: AverageValue
          averageValue: "100"
  behavior:
    scaleUp:
      # aggressive scale-up: allow large, fast increases
      stabilizationWindowSeconds: 0
      selectPolicy: Max
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 5
          periodSeconds: 60
    scaleDown:
      # conservative scale-down: wait 5 minutes before removing pods
      stabilizationWindowSeconds: 300
      selectPolicy: Max
      policies:
        - type: Percent
          value: 10
          periodSeconds: 300

---
# Minimal example Deployment for metrics-server (ensure RBAC/ClusterRoles are configured in production)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-server
  namespace: kube-system
  labels:
    k8s-app: metrics-server
spec:
  replicas: 1
  selector:
    matchLabels:
      k8s-app: metrics-server
  template:
    metadata:
      labels:
        k8s-app: metrics-server
    spec:
      serviceAccountName: metrics-server
      containers:
        - name: metrics-server
          image: k8s.gcr.io/metrics-server/metrics-server:v0.6.2
          args:
            - --kubelet-insecure-tls
            - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname
          ports:
            - containerPort: 4443

---
# Example Prometheus Adapter config to expose a custom metric `encryption_queue_depth`
# This is a snippet for the Prometheus Adapter's rules ConfigMap. Adjust per your adapter installation.
apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-metrics-config
  namespace: custom-metrics
data:
  rules: |
    - seriesQuery: 'encryption_queue_depth'
      resources:
        overrides:
          namespace:
            resource: namespace
      name:
        matches: "^encryption_queue_depth$"
        as: "encryption_queue_depth"
      metricsQuery: 'sum(encryption_queue_depth) by (namespace)'

# NOTES:
# - The HPA uses an External metric named `encryption_queue_depth`. In production you must
#   provide a metrics pipeline (Prometheus + prometheus-adapter) that exposes this metric
#   to the Kubernetes custom/external metrics API.
# - The example metrics-server Deployment is minimal; production setups require RBAC
#   ClusterRole/ClusterRoleBinding and TLS configuration per metrics-server docs.
# - The behavior section configures aggressive scale-up (50% increases / +5 pods) and
#   conservative scale-down (stabilization window 300s) to reduce flapping.
