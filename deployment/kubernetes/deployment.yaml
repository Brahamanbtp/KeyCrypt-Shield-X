apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycrypt-shield-x
  labels:
    app: keycrypt-shield-x
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: keycrypt-shield-x
  template:
    metadata:
      labels:
        app: keycrypt-shield-x
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 10001
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - keycrypt-shield-x
              topologyKey: kubernetes.io/hostname
      containers:
        - name: api
          image: keycrypt-shield-x:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: keycrypt-config
            - secretRef:
                name: keycrypt-secret
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: data-storage
              mountPath: /app/data
            - name: app-config
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: data-storage
          persistentVolumeClaim:
            claimName: keycrypt-pvc
        - name: app-config
          configMap:
            name: keycrypt-config
